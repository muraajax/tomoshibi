<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>創作物 | 灯火</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:    #050403;
      --panel:    #13110e;
      --border:   #2a2318;
      --gold:     #c8a96e;
      --gold-dim: #7a6440;
      --ember:    #d4622a;
      --muted:    #ffffff;
      --ivory:    #ffffff;
    }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--black);
      color: #fff;
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* ── Background ── */
    .page-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(5,4,3,0.75),rgba(5,4,3,0.75)), url('images/Tomo.png');
      background-size: cover; background-position: center;
      pointer-events: none;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1; opacity: 0.4;
    }

    /* ── Header ── */
    header { border-bottom: 1px solid var(--border); position: fixed; top: 0; left: 0; right: 0; background: rgba(5,4,3,0.94); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 200; }
    .header-inner { max-width: 900px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; gap: 20px; }
    .site-logo { font-family: 'Cinzel', serif; font-weight: 900; font-size: 22px; color: var(--gold); letter-spacing: 0.08em; text-decoration: none; text-transform: uppercase; white-space: nowrap; flex: 1; }
    .site-logo span { color: var(--ember); }
    nav ul { list-style: none; display: flex; gap: 28px; }
    nav a { color: var(--muted); text-decoration: none; font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 0.2em; text-transform: uppercase; transition: color 0.3s; }
    nav a:hover { color: var(--gold); }

    /* ── Language Picker ── */
    .lang-picker { position: relative; flex-shrink: 0; }
    .lang-btn {
      display: flex; align-items: center; gap: 6px;
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-family: 'Cinzel', serif;
      font-size: 0.65rem; letter-spacing: 0.18em;
      padding: 7px 11px; cursor: pointer;
      transition: border-color 0.3s, color 0.3s; white-space: nowrap;
    }
    .lang-btn:hover, .lang-picker.open .lang-btn { border-color: var(--gold-dim); color: var(--gold); }
    .lang-btn svg { transition: transform 0.3s; flex-shrink: 0; }
    .lang-picker.open .lang-btn svg { transform: rotate(180deg); }
    .lang-dropdown {
      display: none; position: absolute; top: calc(100% + 6px); right: 0;
      background: #0d0b09; border: 1px solid var(--border);
      list-style: none; min-width: 168px; z-index: 400;
      max-height: 340px; overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    }
    .lang-picker.open .lang-dropdown { display: block; }
    .lang-dropdown li {
      padding: 11px 16px; font-size: 0.82rem; color: var(--muted);
      cursor: pointer; transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Noto Serif JP','Noto Naskh Arabic','Noto Serif Devanagari','Noto Serif Bengali',serif;
    }
    .lang-dropdown li:hover, .lang-dropdown li:active { background: var(--panel); color: var(--ivory); }
    .lang-dropdown li.active { color: #fff; }

    /* ── Hamburger ── */
    .hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; width: 36px; height: 36px; background: none; border: none; cursor: pointer; padding: 4px; z-index: 210; flex-shrink: 0; }
    .hamburger span { display: block; width: 100%; height: 1px; background: var(--gold-dim); transition: transform 0.3s, opacity 0.3s, background 0.3s; transform-origin: center; }
    .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); background: var(--gold); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); background: var(--gold); }

    /* ── Mobile Drawer ── */
    .mobile-nav { display: none; position: fixed; inset: 0; background: rgba(5,4,3,0.97); z-index: 190; flex-direction: column; align-items: center; justify-content: center; gap: 40px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .mobile-nav.open { opacity: 1; pointer-events: auto; }
    .mobile-nav a { font-family: 'Cinzel', serif; font-size: 1.2rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .mobile-nav a:hover { color: var(--gold); }

    /* ── Main content ── */
    .container {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 40px;
      padding: 40px 24px;
      margin-top: 70px;
    }
    .label {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      letter-spacing: 0.5em;
      color: var(--gold-dim);
      text-transform: uppercase;
    }
    .message {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(1.4rem, 5vw, 2.6rem);
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.18em;
      line-height: 2;
    }
    .message span {
      display: block;
      animation: pulse 3s ease-in-out infinite;
    }
    .message span:nth-child(2) { animation-delay: 0.4s; }
    .message span:nth-child(3) { animation-delay: 0.8s; }
    .message span:nth-child(4) { animation-delay: 1.2s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }
    .ornament {
      display: flex; align-items: center; gap: 12px;
      color: var(--gold-dim); font-size: 0.7rem;
      letter-spacing: 0.3em; width: 280px;
    }
    .ornament::before, .ornament::after {
      content: ''; flex: 1; height: 1px;
    }
    .ornament::before { background: linear-gradient(to right, transparent, var(--gold-dim)); }
    .ornament::after  { background: linear-gradient(to left,  transparent, var(--gold-dim)); }
    .back-link {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      letter-spacing: 0.3em;
      color: var(--gold-dim);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s;
      border: 1px solid var(--border);
      padding: 12px 28px;
    }
    .back-link:hover { color: #fff; border-color: #fff; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .hamburger { display: flex; }
      header nav { display: none; }
      .mobile-nav { display: flex; }
      .header-inner { padding: 13px 16px; gap: 12px; }
      .site-logo { font-size: clamp(0.52rem, 3.2vw, 0.75rem); }
      .lang-btn { padding: 6px 9px; font-size: 0.6rem; }
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>

  <!-- Mobile drawer -->
  <nav class="mobile-nav" id="mobile-nav" aria-hidden="true">
    <a href="index.html#posts"      data-i18n="nav-posts"      onclick="closeMenu()">刻印物</a>
    <a href="works.html"            data-i18n="nav-works"      onclick="closeMenu()">創作物</a>
    <a href="index.html#tomoshibi" data-i18n="nav-tomoshibi"  onclick="closeMenu()">灯火</a>
  </nav>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="site-logo">Bring light into<span>&nbsp;the darkness</span></a>

      <nav aria-label="main">
        <ul>
          <li><a href="index.html#posts"      data-i18n="nav-posts">刻印物</a></li>
          <li><a href="works.html"            data-i18n="nav-works">創作物</a></li>
          <li><a href="index.html#tomoshibi" data-i18n="nav-tomoshibi">灯火</a></li>
        </ul>
      </nav>

      <!-- Language picker -->
      <div class="lang-picker" id="lang-picker">
        <button class="lang-btn" id="lang-btn" aria-expanded="false" aria-haspopup="listbox">
          <span id="lang-current">JA</span>
          <svg width="8" height="5" viewBox="0 0 8 5" fill="none"><path d="M0 0L4 5L8 0" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
        <ul class="lang-dropdown" id="lang-dropdown" role="listbox">
          <li role="option" data-lang="ja"  class="active">日本語</li>
          <li role="option" data-lang="en">English</li>
          <li role="option" data-lang="fr">Français</li>
          <li role="option" data-lang="es">Español</li>
          <li role="option" data-lang="pt">Português</li>
          <li role="option" data-lang="hi">हिन्दी</li>
          <li role="option" data-lang="ar">العربية</li>
          <li role="option" data-lang="bn">বাংলা</li>
          <li role="option" data-lang="ru">Русский</li>
          <li role="option" data-lang="id">Indonesia</li>
          <li role="option" data-lang="de">Deutsch</li>
          <li role="option" data-lang="pl">Polski</li>
          <li role="option" data-lang="ko">한국어</li>
          <li role="option" data-lang="zh">北京語</li>
          <li role="option" data-lang="yue">廣東語</li>
        </ul>
      </div>

      <button class="hamburger" id="hamburger" aria-label="メニューを開く" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="container">
    <div class="label">— 創作物 —</div>
    <div class="ornament">✦</div>
    <div class="message">
      <span>只今</span>
      <span>創作中</span>
      <span>今暫し</span>
      <span>待たれよ</span>
    </div>
    <div class="ornament">✦</div>
    <a href="index.html" class="back-link">← 灯火へ戻る</a>
  </div>

  <script>
    const translations = {
      ja:  { 'nav-posts':'刻印物', 'nav-works':'創作物', 'nav-tomoshibi':'灯火' },
      en:  { 'nav-posts':'Posts',  'nav-works':'Works',  'nav-tomoshibi':'Tomoshibi' },
      fr:  { 'nav-posts':'Articles','nav-works':'Œuvres','nav-tomoshibi':'Lumière' },
      es:  { 'nav-posts':'Artículos','nav-works':'Obras','nav-tomoshibi':'Lumbre' },
      pt:  { 'nav-posts':'Artigos','nav-works':'Obras', 'nav-tomoshibi':'Lume' },
      hi:  { 'nav-posts':'लेख',   'nav-works':'रचनाएँ','nav-tomoshibi':'दीपशिखा' },
      ar:  { 'nav-posts':'المقالات','nav-works':'أعمال','nav-tomoshibi':'ضوء' },
      bn:  { 'nav-posts':'প্রবন্ধ','nav-works':'সৃষ্টিকর্ম','nav-tomoshibi':'আলো' },
      ru:  { 'nav-posts':'Статьи','nav-works':'Работы','nav-tomoshibi':'Огонёк' },
      id:  { 'nav-posts':'Artikel','nav-works':'Karya', 'nav-tomoshibi':'Cahaya' },
      de:  { 'nav-posts':'Artikel','nav-works':'Werke', 'nav-tomoshibi':'Licht' },
      pl:  { 'nav-posts':'Artykuły','nav-works':'Twórczość','nav-tomoshibi':'Blask' },
      ko:  { 'nav-posts':'글',     'nav-works':'작품',  'nav-tomoshibi':'등불' },
      zh:  { 'nav-posts':'文章',   'nav-works':'作品',  'nav-tomoshibi':'灯火' },
      yue: { 'nav-posts':'文章',   'nav-works':'作品',  'nav-tomoshibi':'燈火' },
    };

    const langLabels = { ja:'JA',en:'EN',fr:'FR',es:'ES',pt:'PT',hi:'HI',ar:'AR',bn:'BN',ru:'RU',id:'ID',de:'DE',pl:'PL',ko:'KO',zh:'ZH',yue:'YUE' };

    let currentLang = localStorage.getItem('lang') || 'ja';

    function applyLang(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang;
      document.getElementById('lang-current').textContent = langLabels[lang] || lang.toUpperCase();
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) el.textContent = translations[lang][key];
      });
      document.querySelectorAll('#lang-dropdown li').forEach(li => {
        li.classList.toggle('active', li.dataset.lang === lang);
      });
      document.documentElement.setAttribute('data-lang', lang);
    }

    // Language picker
    const picker = document.getElementById('lang-picker');
    const btn    = document.getElementById('lang-btn');
    const dropdown = document.getElementById('lang-dropdown');
    btn.addEventListener('click', e => { e.stopPropagation(); picker.classList.toggle('open'); btn.setAttribute('aria-expanded', picker.classList.contains('open')); });
    document.addEventListener('click', () => { picker.classList.remove('open'); btn.setAttribute('aria-expanded','false'); });
    dropdown.addEventListener('click', e => {
      const li = e.target.closest('li[data-lang]');
      if (li) { applyLang(li.dataset.lang); picker.classList.remove('open'); }
    });

    // Hamburger
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobile-nav');
    function openMenu()  { hamburger.classList.add('open'); mobileNav.classList.add('open'); mobileNav.setAttribute('aria-hidden','false'); hamburger.setAttribute('aria-expanded','true'); }
    function closeMenu() { hamburger.classList.remove('open'); mobileNav.classList.remove('open'); mobileNav.setAttribute('aria-hidden','true'); hamburger.setAttribute('aria-expanded','false'); }
    hamburger.addEventListener('click', () => hamburger.classList.contains('open') ? closeMenu() : openMenu());

    applyLang(currentLang);
  </script>
</body>
</html>
