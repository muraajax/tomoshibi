<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>創作物 | 灯火</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:  #050403;
      --panel:  #13110e;
      --border: #2a2318;
      --gold:   #c8a96e;
      --gold-dim: #7a6440;
      --ember:  #d4622a;
    }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--black);
      color: #fff;
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .page-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(5,4,3,0.75),rgba(5,4,3,0.75)), url('images/Tomo.png');
      background-size: cover; background-position: center;
      pointer-events: none;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1; opacity: 0.4;
    }
    .container {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 40px;
      padding: 40px 24px;
    }
    .label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      color: var(--gold-dim);
      text-transform: uppercase;
    }
    .message {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(1.4rem, 5vw, 2.6rem);
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.18em;
      line-height: 2;
    }
    .message span {
      display: block;
      animation: pulse 3s ease-in-out infinite;
    }
    .message span:nth-child(2) { animation-delay: 0.4s; }
    .message span:nth-child(3) { animation-delay: 0.8s; }
    .message span:nth-child(4) { animation-delay: 1.2s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }
    .ornament {
      display: flex; align-items: center; gap: 12px;
      color: var(--gold-dim); font-size: 0.7rem;
      letter-spacing: 0.3em; width: 280px;
    }
    .ornament::before, .ornament::after {
      content: ''; flex: 1; height: 1px;
    }
    .ornament::before { background: linear-gradient(to right, transparent, var(--gold-dim)); }
    .ornament::after  { background: linear-gradient(to left,  transparent, var(--gold-dim)); }
    .back-link {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--gold-dim);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s;
      border: 1px solid var(--border);
      padding: 12px 28px;
    }
    .back-link:hover { color: #fff; border-color: #fff; }
  </style>
</head>
<body>
  <div class="page-bg"></div>
  <div class="container">
    <div class="label">— 創作物 —</div>
    <div class="ornament">✦</div>
    <div class="message">
      <span>只今</span>
      <span>捜索中</span>
      <span>今暫し</span>
      <span>待たれよ</span>
    </div>
    <div class="ornament">✦</div>
    <a href="index.html" class="back-link">← 灯火へ戻る</a>
  </div>
</body>
</html>
